<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios</title>

  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="perfil.css">
  <link rel="stylesheet" href="usuarios-page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="cont">
    <nav class="navbar">
      <div class="triumph_logo"></div>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="perfil.html">Perfil</a></li>
        <li><a href="usuarios.html" id="linkUsuarios" class="active">Usuarios</a></li>
        <li><a href="register.html" id="linkRegistrarUsuarios">Registrar Usuarios</a></li>
        <li><a href="mantenimientos.html" id="linkMantenimientos">Historial de mantenimientos</a></li>
      </ul>
    </nav>

    <div class="contUsuarios">
      <div style="padding: 8px 12px;">
        <div class="InputContainer">
          <input
          placeholder="Search"
          id="input"
          class="input"
          name="text"
          type="text"
          />
          
          <label class="labelforsearch" for="input">
            <svg class="searchIcon" viewBox="0 0 512 512">
                <path
                d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"
                ></path>
            </svg>
          </label>
        </div>

        <div class="user-info">
          <div class="fotoUsuario" id="fotoUsuarioTop"></div>
          <div>
            <span id="nombreUsuarioTop" style="font-weight: bold; font-size: 14px; font-family: inter, sans-serif;">Usuario</span><br>
            <span id="correoUsuarioTop" style="font-family: inter, sans-serif; font-size: 12px;">correo@admin.com</span>
          </div>
          <button onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
          </button>
        </div>
      </div>

      <div class="usuariosHeader">
        <div>
          <h1>Usuarios</h1>
          <p>Administración general de usuarios registrados en el sistema</p>
        </div>

        <div class="usuariosAcciones">
          <button class="btnAzul" id="btnNuevoUsuario">Agregar nuevo</button>
          <button class="btnBlanco" id="btnExportar">Exportar</button>
        </div>
      </div>

      <div class="usuariosResumen">
        <div class="resumenCard">
          <span>Total usuarios</span>
          <strong id="totalUsuarios">0</strong>
        </div>
        <div class="resumenCard">
          <span>Admins</span>
          <strong id="totalAdmins">0</strong>
        </div>
        <div class="resumenCard">
          <span>Técnicos</span>
          <strong id="totalTecnicos">0</strong>
        </div>
      </div>

      <div class="usuariosTablaCard">
        <div class="usuariosTablaHeader">
          <span>Foto</span>
          <span>Nombre</span>
          <span>Correo</span>
          <span>Rol</span>
          <span>Estado</span>
          <span>Acciones</span>
        </div>

        <div id="usuariosLista"></div>
      </div>
    </div>
  </div>

  <script src="usuarios-page.js"></script>
</body>
</html>
