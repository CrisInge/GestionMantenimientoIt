<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Usuario</title>

  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="perfil.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .contRegister {
      margin-left: 20%;
      width: calc(100% - 20%);
      min-height: 100vh;
      padding: 20px 40px;
      overflow-y: auto;
      background: #f5f5f5;
    }

    .topbarRegister {
      /* display: flex; */
      /* justify-content: space-between; */
      align-items: center;
      gap: 20px;
      padding: 8px 12px;
      /* margin-bottom: 30px; */
    }

    .topbarRegister .InputContainer {
      width: 60%;
    }

    .registerWrapper {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-top: 43px;
      padding: 0 20px;
    }

    .registerHeader h1 {
      font-size: 32px;
      margin: 0;
      line-height: 1;
    }

    .registerHeader p {
      margin-top: 8px;
      color: #666;
      font-size: 16px;
    }

    .registerCard {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
      padding: 28px;
      max-width: 820px;
    }

    .registerCard h2 {
      margin: 0 0 20px 0;
      font-size: 30px;
    }

    .registerForm {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .registerRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .registerGroup {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .registerGroup.full {
      grid-column: 1 / -1;
    }

    .registerGroup label {
      font-weight: bold;
      color: #333;
      font-size: 15px;
    }

    .registerGroup input,
    .registerGroup select {
      height: 46px;
      border: 1px solid #d7d7d7;
      border-radius: 10px;
      padding: 0 14px;
      outline: none;
      background: #fff;
      font-size: 14px;
    }

    .registerActions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btnAzul {
      background-color: #293D96;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      padding: 12px 18px;
      cursor: pointer;
    }

    .btnBlanco {
      background: white;
      color: #333;
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      font-weight: bold;
      padding: 12px 18px;
      cursor: pointer;
    }

    .helperText {
      color: #777;
      font-size: 13px;
      margin-top: -4px;
    }

    @media (max-width: 980px) {
      .registerRow {
        grid-template-columns: 1fr;
      }

      .topbarRegister {
        flex-direction: column;
        align-items: stretch;
      }

      .topbarRegister .InputContainer {
        width: 100%;
      }

      .registerCard {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="cont">
    <nav class="navbar">
      <div class="triumph_logo"></div>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="perfil.html">Perfil</a></li>
        <li><a href="usuarios.html" id="linkUsuarios">Usuarios</a></li>
        <li><a href="register.html" id="linkRegistrarUsuarios" class="active">Registrar Usuarios</a></li>
        <li><a href="mantenimientos.html" id="linkMantenimientos">Historial de mantenimientos</a></li>
      </ul>
    </nav>

    <div class="contRegister">
      <div class="topbarRegister">
        <div class="InputContainer">
          <input
          placeholder="Search"
          id="input"
          class="input"
          name="text"
          type="text"
          />
          
          <label class="labelforsearch" for="input">
            <svg class="searchIcon" viewBox="0 0 512 512">
                <path
                d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"
                ></path>
            </svg>
          </label>
        </div>

        <div class="user-info">
          <div class="fotoUsuario" id="fotoUsuarioTop"></div>
          <div>
            <span id="nombreUsuarioTop" style="font-weight: bold; font-size: 14px; font-family: inter, sans-serif;">Usuario</span><br>
            <span id="correoUsuarioTop" style="font-family: inter, sans-serif; font-size: 12px;">correo@admin.com</span>
          </div>
          <button class="btnLogout" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
          </button>
        </div>
      </div>

      <div class="registerWrapper">
        <div class="registerHeader">
          <h1>Registrar usuario</h1>
          <p>Alta de nuevos usuarios dentro del sistema</p>
        </div>

        <div class="registerCard">
          <h2>Datos del usuario</h2>

          <div class="registerForm">
            <div class="registerRow">
              <div class="registerGroup">
                <label for="nombre">Nombre completo</label>
                <input id="nombre" placeholder="Ingresa el nombre completo">
              </div>

              <div class="registerGroup">
                <label for="correo">Correo electrónico</label>
                <input id="correo" placeholder="Ingresa el correo">
              </div>
            </div>

            <div class="registerRow">
              <div class="registerGroup">
                <label for="password">Contraseña</label>
                <input id="password" type="password" placeholder="Ingresa la contraseña">
              </div>

              <div class="registerGroup">
                <label for="rol">Rol</label>
                <select id="rol">
                  <option value="tecnico">Técnico</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>

            <div class="helperText">
              El usuario será registrado con los datos capturados y podrá iniciar sesión con su correo y contraseña.
            </div>

            <div class="registerActions">
              <button class="btnAzul" onclick="crearUsuario()">Crear Usuario</button>
              <button class="btnBlanco" onclick="volver()">Volver</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
const API = "http://localhost:3000";
const rol = localStorage.getItem("rol");
const id = localStorage.getItem("id");
const nombre = localStorage.getItem("nombre");
const correo = localStorage.getItem("correo");
const fotoPerfil = localStorage.getItem("foto_perfil");

// 🔒 PROTEGER (solo admin)
if (rol !== "admin") {
  alert("Acceso denegado");
  window.location.href = "index.html";
}

function ponerAvatar(elemento, nombre, foto) {
  if (!elemento) return;

  if (foto && foto.trim() !== "") {
    elemento.style.backgroundImage = `url('${foto}')`;
    elemento.textContent = "";
  } else {
    elemento.style.backgroundImage = "none";
    elemento.textContent = nombre ? nombre.trim().charAt(0).toUpperCase() : "?";
  }
}

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("rol");
  localStorage.removeItem("id");
  localStorage.removeItem("nombre");
  localStorage.removeItem("correo");
  localStorage.removeItem("foto_perfil");
  window.location.href = "login.html";
}

async function cargarUsuarioActual() {
  try {
    if (!id) return;

    const res = await fetch(`${API}/usuarios/${id}`);
    const data = await res.json();

    const nombreTop = document.getElementById("nombreUsuarioTop");
    const correoTop = document.getElementById("correoUsuarioTop");
    const fotoTop = document.getElementById("fotoUsuarioTop");

    if (res.ok) {
      if (nombreTop) nombreTop.textContent = data.nombre || "Usuario";
      if (correoTop) correoTop.textContent = data.correo || "Sin correo";
      ponerAvatar(fotoTop, data.nombre, data.foto_perfil);

      localStorage.setItem("nombre", data.nombre || "");
      localStorage.setItem("correo", data.correo || "");

      if (data.foto_perfil && data.foto_perfil.trim() !== "") {
        localStorage.setItem("foto_perfil", data.foto_perfil);
      } else {
        localStorage.removeItem("foto_perfil");
      }
    } else {
      if (nombreTop) nombreTop.textContent = nombre || "Usuario";
      if (correoTop) correoTop.textContent = correo || "Sin correo";
      ponerAvatar(fotoTop, nombre, fotoPerfil || "");
    }
  } catch (error) {
    const fotoTop = document.getElementById("fotoUsuarioTop");
    const nombreTop = document.getElementById("nombreUsuarioTop");
    const correoTop = document.getElementById("correoUsuarioTop");

    if (nombreTop) nombreTop.textContent = nombre || "Usuario";
    if (correoTop) correoTop.textContent = correo || "Sin correo";
    ponerAvatar(fotoTop, nombre, fotoPerfil || "");
  }
}

// 🚀 CREAR USUARIO
async function crearUsuario() {
  const usuario = {
    nombre: document.getElementById("nombre").value.trim(),
    correo: document.getElementById("correo").value.trim(),
    password: document.getElementById("password").value,
    rol: document.getElementById("rol").value
  };

  if (!usuario.nombre || !usuario.correo || !usuario.password || !usuario.rol) {
    alert("Completa todos los campos");
    return;
  }

  const res = await fetch(`${API}/usuarios`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(usuario)
  });

  const data = await res.json();
  alert(data.message || "Proceso completado");

  if (res.ok) {
    document.getElementById("nombre").value = "";
    document.getElementById("correo").value = "";
    document.getElementById("password").value = "";
    document.getElementById("rol").value = "tecnico";
  }
}

// 🔙 VOLVER
function volver() {
  window.location.href = "usuarios.html";
}

cargarUsuarioActual();
</script>

</body>
</html>
